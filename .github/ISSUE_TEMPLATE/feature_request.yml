name: Feature request
description: Suggest a new feature or improvement.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening: please check the README roadmap and existing issues — your idea may already be tracked.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. "Wouldn't it be cool if..." is not enough — what are you trying to do today and where does it fall short?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? CLI shape, Python API, behaviour.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or competing libraries that solve it differently.

  - type: dropdown
    id: scope
    attributes:
      label: Where does this belong?
      options:
        - hl-archive (data layer)
        - hyperbt (backtester) — wrong repo, but related
        - hl-tui (dashboard) — wrong repo, but related
        - Not sure
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Anything else?
